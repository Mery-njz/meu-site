<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Sobre mim - Mery</title>
  <link rel="icon" type="image/png" href="icon.jpg">

  <style>
    body {
      background-color: rgb(0, 0, 0); 
      font-family: 'Lobster', cursive;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .quadro {
      background-color: #fff;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 4px 12px rgba(255, 192, 235, 0.4);
      width: 90%;
      max-width: 900px;
    }

    h1 {
      text-align: center;
      color: pink;
      margin-bottom: 20px;
    }

    /* Flex container */
    .flex-container {
      display: flex;
      flex-direction: row; /* horizontal */
      justify-content: space-around;
      align-items: center;
      gap: 20px;
    }

    .flex-container > div {
      flex: 1;
      text-align: center;
    }

    .flex-container img {
      width: 200px;
      height: 200px;
      object-fit: cover;
      border-radius: 50%; /* foto redonda */
      box-shadow: 0 0 15px rgba(255, 128, 192, 0.7); /* sombra rosa */
      margin-bottom: 15px;
    }

    p {
      color: #333;
      margin: 10px 0;
    }

    .btn {
      display: inline-block;
      padding: 10px 20px;
      background-color: #ffc0eb;
      color: #000;
      text-decoration: none;
      border-radius: 20px;
      font-weight: bold;
      transition: all 0.3s ease;
      margin-top: 20px;
    }

    .btn:hover {
      background-color: #ff9fd6;
      transform: scale(1.05);
    }

    /* Responsivo: vira coluna no celular */
    @media screen and (max-width:600px) {
      .flex-container {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <div class="quadro">
    <h1>Sobre mim</h1>
    <div class="flex-container">
      <div>
        <img src="news.jpg" alt="njz">
        <p>Oi, eu sou a Mery ♡</p>
      </div>
      <div>
        <p>Sou apaixonada por livros, mangás e manhwas.</p>
        <p>Adoro músicas e filmes que me fazem sonhar e sentir.</p>
        <p>Este espaço é meu cantinho para guardar tudo o que amo ✨</p>
      </div>
    </div>
    <a href="index.html" class="btn">Voltar para Home</a>
  </div>
</body>
</html>
