<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Sobre mim - Mery</title>
  <link rel="icon" type="image/png" href="icon.jpg">

  <style>
    body {
      background-color: #000; /* fundo preto */
      font-family: 'Lobster', cursive;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      color: #f5f5f5;
    }

    .quadro {
      background-color: #111; /* quadro mais claro que o fundo */
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 4px 12px rgba(255, 128, 192, 0.4); /* sombra rosa */
      width: 90%;
      max-width: 1000px;
    }

    h1 {
      text-align: center;
      color: pink;
      margin-bottom: 30px;
    }

    /* Duas colunas */
    .sobre {
      display: flex;
      gap: 30px;
    }

    .coluna {
      flex: 1;
    }

    .coluna img {
      width: 100%;
      border-radius: 12px;
      margin-bottom: 15px;
      box-shadow: 0 0 15px rgba(255, 128, 192, 0.6); /* sombra rosa nas fotos */
    }

    .coluna p {
      margin: 10px 0;
      line-height: 1.6;
      color: #f5f5f5;
    }

    .btn {
      display: inline-block;
      padding: 10px 20px;
      background-color: #ffc0eb;
      color: #000;
      text-decoration: none;
      border-radius: 20px;
      font-weight: bold;
      transition: all 0.3s ease;
      margin-top: 20px;
    }

    .btn:hover {
      background-color: #ff9fd6;
      transform: scale(1.05);
    }

    /* Responsivo: vira uma coluna no celular */
    @media screen and (max-width:700px) {
      .sobre {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <div class="quadro">
    <h1>Sobre mim</h1>
    <div class="sobre">
      <!-- Coluna de fotos -->
      <div class="coluna">
        <img src="mini eu.jpeg" alt="Minha foto">
        <img src="njz.jpg" alt="Livro favorito">
        <img src="raposo.jpg" alt="Música que amo">
      </div>

      <!-- Coluna de texto -->
      <div class="coluna">
        <p>Oi, eu sou a Mery ♡</p>
        <p>Sou apaixonada por livros, mangás.</p>
        <p>Adoro músicas e filmes que me fazem sonhar e sentir.</p>
        <p>Este espaço é meu cantinho para guardar tudo o que amo ✨</p>
      </div>
    </div>
    <a href="index.html" class="btn">Voltar para Home</a>
  </div>
</body>
</html>
