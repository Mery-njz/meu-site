<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Sobre mim - Mery</title>
  <link rel="icon" type="image/png" href="icon.jpg">

  <style>
    body {
      background-color: #000; /* fundo preto */
      font-family: 'Lobster', cursive;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .quadro {
      background-color: #fff; /* quadro branco */
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 0 20px rgba(255, 128, 192, 0.6); /* sombra rosa */
      width: 90%;
      max-width: 1000px;
    }

    h1 {
      text-align: center;
      color: pink;
      margin-bottom: 30px;
    }

    /* Duas colunas dentro do quadro */
    .sobre {
      display: flex;
      gap: 40px;
    }

    .coluna {
      flex: 1;
    }

    .coluna img {
  max-width: 250px;   /* tamanho máximo da foto */
  height: auto;       /* mantém proporção */
  display: block;     /* permite centralizar */
  margin: 0 auto 20px auto; /* centraliza e dá espaço abaixo */
  border-radius: 12px;
  box-shadow: 0 0 15px rgba(255, 128, 192, 0.7); /* sombra rosa */
}


    .coluna p {
      margin: 15px 0;
      line-height: 1.6;
      color: #333; /* texto escuro dentro do quadro branco */
      font-size: 18px;
    }

    .btn {
      display: inline-block;
      padding: 10px 20px;
      background-color: #ffc0eb;
      color: #000;
      text-decoration: none;
      border-radius: 20px;
      font-weight: bold;
      transition: all 0.3s ease;
      margin-top: 30px;
    }

    .btn:hover {
      background-color: #ff9fd6;
      transform: scale(1.05);
    }

    
    @media screen and (max-width:700px) {
      .sobre {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <div class="quadro">
    <h1>Sobre mim</h1>
    <div class="sobre">
      
      <div class="coluna">
        <img src="mini eu.jpeg" alt="Minha foto">
        <img src="livro.jpg" alt="Livro favorito">
        <img src="musica.jpg" alt="Música que amo">
      </div>

      
      <div class="coluna">
        <p>Oi, eu sou a Melody ♡</p>
        <p>Sou apaixonada por livros, mangás e manhwas.</p>
        <p>Adoro músicas e filmes que me fazem sonhar e sentir.</p>
        <p>Este espaço é meu cantinho para guardar tudo o que amo ✨</p>
      </div>
    </div>
    <a href="index.html" class="btn">Voltar para Home</a>
  </div>
</body>
</html>
