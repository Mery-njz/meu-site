<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Sobre mim - Mery</title>
  <link rel="icon" type="image/png" href="icon.jpg">

  <style>
    body {
      background-color: rgb(248, 221, 231);
      font-family: 'Lobster', cursive;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .quadro {
      background-color: #fff;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 4px 12px rgba(255, 192, 235, 0.4);
      width: 90%;
      max-width: 1000px;
    }

    h1 {
      text-align: center;
      color: pink;
      margin-bottom: 20px;
    }

    /* Layout em duas colunas */
    .sobre {
      display: grid;
      grid-template-columns: 1fr 1fr; /* duas colunas iguais */
      gap: 30px;
      align-items: start;
    }

    .sobre img {
      width: 100%;
      border-radius: 12px;
      box-shadow: 0 0 15px rgba(255, 128, 192, 0.7); /* sombra rosa */
      margin-bottom: 15px;
    }

    .texto p {
      color: #333;
      margin: 10px 0;
      line-height: 1.6;
    }

    .btn {
      display: inline-block;
      padding: 10px 20px;
      background-color: #ffc0eb;
      color: #000;
      text-decoration: none;
      border-radius: 20px;
      font-weight: bold;
      transition: all 0.3s ease;
      margin-top: 20px;
    }

    .btn:hover {
      background-color: #ff9fd6;
      transform: scale(1.05);
    }

    /* Responsivo: vira uma coluna no celular */
    @media screen and (max-width:600px) {
      .sobre {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="quadro">
    <h1>Sobre mim</h1>
    <div class="sobre">
      <!-- Coluna de fotos -->
      <div>
        <img src="mini eu.jpeg" alt="Minha foto">
        <img src="njz.jpg" alt="Livro que gosto">
        <img src="raposo.jpg" alt="Música favorita">
      </div>

      <!-- Coluna de texto -->
      <div class="texto">
        <p>Oi, eu sou a Mery ♡</p>
        <p>Sou apaixonada por livros, mangás.</p>
        <p>Adoro músicas e filmes que me fazem sonhar e sentir.</p>
        <p>Este espaço é meu cantinho para guardar tudo o que amo ✨</p>
      </div>
    </div>
    <a href="index.html" class="btn">Voltar para Home</a>
  </div>
</body>
</html>
