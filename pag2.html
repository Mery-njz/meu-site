  <style>
    body {
      background-color: #000; 
      font-family: 'Lobster', cursive;
      color: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }

    .quadro {
      background-color: #fff;
      padding: 40px;
      width: 90%;
      max-width: 900px;
      text-align: center;
      box-shadow: 0 4px 12px rgba(255, 192, 235, 0.4);
    }

    h2 {
      color: pink;
      margin-bottom: 10px;
    }

    p {
      text-align: center;
      margin: 10px 0;
      color: #333;
    }

    
    .music {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
      gap: 15px;
      margin: 20px 0;
    }

    .music img {
      width: 100%;
      filter: grayscale(100%);
      transition: transform 0.3s ease, filter 0.5s ease;
      cursor: pointer;
    }

    .music img:hover {
      transform: scale(1.05);
      filter: grayscale(0%);
      box-shadow: 0 0 10px rgba(255, 128, 192, 0.6);
    }

  
    .btn {
      display: inline-block;
      padding: 10px 20px;
      background-color: #ffc0eb;
      color: #000;
      text-decoration: none;
      border-radius: 20px;
      font-weight: bold;
      transition: all 0.3s ease;
    }

    .btn:hover {
      background-color: #ff9fd6;
      transform: scale(1.05);
    }
  </style>
</head>
