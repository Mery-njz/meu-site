  <style>
    body {
      background-color: #f0f0e8;
      font-family: Georgia, serif;
      color: #333;
      margin: 20px;
      display: flex;
      justify-content: center;
    }
    .container {
      display: flex;
      max-width: 900px;
      width: 90%;
      background: #f9f9f4;
      border: 2px solid #dcdcdc;
      border-radius: 8px;
      padding: 15px;
      box-sizing: border-box;
    }
    /* Galeria de capas */
    .gallery {
      width: 60%;
      height: 500px;
      overflow-y: auto;
      border: 1px solid #ccc;
      padding: 5px;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      background: white;
      border-radius: 6px;
    }
    .gallery a img {
      width: 100%;
      filter: grayscale(100%);
      transition: transform 0.3s ease, filter 0.5s ease;
      cursor: pointer;
      display: block;
    }
    .gallery a img:hover {
      transform: scale(1.05);
      filter: grayscale(0%);
      box-shadow: 0 0 10px rgba(255, 128, 192, 0.6);
    }
    /* Sidebar */
    .sidebar {
      width: 35%;
      margin-left: 20px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    /* Player simples */
    .player {
      border: 2px solid #bbb;
      background: #e0e0d8;
      padding: 10px;
      font-family: 'Courier New', monospace;
      text-align: center;
    }
    .player audio {
      width: 100%;
      outline: none;
    }
    /* Menus */
    .menu-section {
      background: #e8e8d8;
      border-radius: 15px;
      padding: 10px 15px;
      font-style: italic;
      font-size: 14px;
      color: #666;
      user-select: none;
    }
    .menu-list {
      background: white;
      border: 1px solid #ccc;
      border-radius: 6px;
      padding: 10px 15px;
      font-size: 16px;
    }
    .menu-list a {
      display: block;
      color: #333;
      text-decoration: underline;
      margin-bottom: 6px;
      cursor: pointer;
    }
    .menu-list a:hover {
      color: #555;
    }
    /* Botão voltar */
    .btn {
      display: inline-block;
      padding: 10px 20px;
      background-color: #ffc0eb;
      color: #000;
      text-decoration: none;
      border-radius: 20px;
      font-weight: bold;
      transition: all 0.3s ease;
      text-align: center;
      margin-top: 10px;
    }
    .btn:hover {
      background-color: #ff9fd6;
      transform: scale(1.05);
    }
  </style>
</head>
