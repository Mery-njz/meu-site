  <style>
    body {
      background-color: #000; 
      font-family: 'Lobster', cursive;
      color: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }

    .quadro {
      background-color: #fff;
      padding: 40px;
      width: 90%;
      max-width: 1000px;
      text-align: center;
      box-shadow: 0 4px 12px rgba(255, 192, 235, 0.4);
      border-radius: 10px;
    }

    h1 {
      color: pink;
      margin-bottom: 10px;
    }

    p {
      text-align: center;
      margin: 10px 0;
      color: #333;
    }

    .card {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 15px;
      margin-top: 20px;
      justify-content: center;
    }

    .filme {
      position: relative;
      overflow: hidden;
      border-radius: 8px;
    }

    .filme img {
      width: 150px;
      height: 225px;
      object-fit: cover;
      display: block;
      filter: grayscale(100%);
      transition: transform 0.3s ease, filter 0.5s ease;
    }

    .filme:hover img {
      transform: scale(1.08);
      filter: grayscale(0%);
    }

    .filme:hover .descricao {
      opacity: 1;
    }

    .btn {
      display: inline-block;
      padding: 10px 20px;
      background-color: #ffc0eb;
      color: #000;
      text-decoration: none;
      border-radius: 20px;
      font-weight: bold;
      transition: all 0.3s ease;
      margin-top: 20px;
    }

    .btn:hover {
      background-color: #ff9fd6;
      transform: scale(1.05);
    }
  </style>
</head>
