<form class="card" action="/enviar" method="post">
  <h2>Formulario .ᐟ </h2>

  <label for="nome">Nome:</label>
  <input type="text" id="nome" name="nome" required>

  <label for="email">Email:</label>
  <input type="email" id="email" name="email" required>

  <label for="mensagem">Mensagem:</label>
  <textarea id="mensagem" name="mensagem" required></textarea>

<label for="categoria">Categoria da imagem:</label>
<input type="text" id="categoria" name="categoria">

  <div class='formulario'>
  <h2 class='titulo'>Cadastrar</h2>
  <form id="meuFormulario">
    <label for="titulo">Nome do gato</label>
    <input type="text" id="titulo" placeholder="Titulo" required><br>
    <label for="imagem">Imagem do gato</label>
    <input type="url" id="imagem" placeholder="URL da imagem" required><br>
    <label for="paragrafo">Escreva sobre o gato</label>
    <textarea id="paragrafo" placeholder="Diga"></textarea><br>
    <button type="submit">Adicionar</button>
  </form>
</div>

<div id="colecao"></div>

  
  <button type="submit">Enviar</button>
</form>
