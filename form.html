<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Formulário .ᐟ</title>
   
    <script src="script.js" defer></script>
</head>
<body>
    <div class="formulario">
        <h3>cadastro ♰</h3>
        <p>adicione as informações</p>
       
        <!-- CORRIGIDO: ID alterado para CamelCase igual ao JS -->
        <form id="meuFormulario">
            <label for="titulo">Nome</label>
            <input type="text" id="titulo" placeholder="Escreva o nome..." required>
           
            <label for="imagem">URL da foto</label>
            <input type="url" id="imagem" placeholder="https://linkdaimagem.com" required>
           
            <!-- ADICIONADO: Campo descrição da imagem que faltava para o JS funcionar -->
            <label for="descricao">Descrição da imagem (Acessibilidade)</label>
            <input type="text" id="descricao" placeholder="O que tem na foto?" required>

            <label for="paragrafo">Escreva sobre ela</label>
            <textarea id="paragrafo" placeholder="Conte mais detalhes..." required></textarea>
           
            <button type="submit">adicionar ⟡˖ ࣪</button>
        </form>
    </div>
   
    <div id="colecao"></div>
</body>
</html>
