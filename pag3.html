<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Livros - Mery</title>
  <link rel="icon" type="image/png" href="icon.jpg">

  <!-- CSS direto no HTML -->
  <style>
    body {
      background-color: #111; 
      font-family: 'Lobster', cursive;
      color: #f5f5f5;
      text-align: center;
      margin: 0;
    }

    .quadro {
      background-color: #fff;
      padding: 30px;
      width: 80%;
      max-width: 800px;
      margin: 40px auto;
      box-shadow: 0 4px 12px rgba(255, 192, 235, 0.4);
    }

    h2 {
      color: pink;
      margin-bottom: 10px;
    }

    .galeria {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 15px;
      margin: 20px 0;
    }

    .galeria img {
      width: 100%;
      filter: grayscale(100%);
      transition: transform 0.3s ease, filter 0.5s ease;
    }

    .galeria img:hover {
      transform: scale(1.05);
      filter: grayscale(0%);
      box-shadow: 0 0 10px rgba(255, 128, 192, 0.6);
    }

    .btn {
      display: inline-block;
      padding: 10px 20px;
      background-color: #ffc0eb;
      color: #000;
      text-decoration: none;
      border-radius: 20px;
      font-weight: bold;
      transition: all 0.3s ease;
    }

    .btn:hover {
      background-color: #ff9fd6;
      transform: scale(1.05);
    }

    .p {
      color: pink;
    }
  </style>
</head>
<body>
  <div class="quadro">
    <h2>Livros</h2>
    <p>✎﹏﹏﹏﹏</p>
    <p>Livros que eu já li</p>
    <p>cada livro que eu li me mudou de um jeito único...</p>

    <div class="galeria">
      <img src="amor e gelato.jpg" alt="Amor e Gelato">
      <img src="ali.jpg" alt="Ali">
      <img src="A menina que roubava livros.jpg" alt="A menina que roubava livros">
      <img src="cidade de papel.jpg" alt="Cidade de Papel">
      <img src="fallen.jpg" alt="Fallen">
      <img src="para sempre seu.jpg" alt="Para Sempre Seu">
    </div>

    <p>Livro que eu quero ler...</p>
    <a href="livraria.html" class="btn">Voltar para Home</a>
  </div>
</body>
</html>
