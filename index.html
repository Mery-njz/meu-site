<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8" />
<title> ּ֯ . ❥ ּ֯ ┆꒰ 𝚖𝚎𝚛𝚢 𝚜𝚒𝚝𝚎 .ᐟ ꒱</title>
<link href="https://fonts.googleapis.com/css2?family=Special+Elite&display=swap" rel="stylesheet" />
<style>
  body {
    background-color: #f9f9f9;
    font-family: 'Special Elite', monospace, cursive;
    font-size: 14px;
    color: #333;
    margin: 0;
    padding: 20px;
  }
  .container {
    width: 900px;
    margin: 0 auto;
    position: relative;
  }
  /* Coluna esquerda */
  .left-column {
    width: 200px;
    float: left;
    text-align: center;
  }
  .left-column img {
    max-width: 100%;
    margin-bottom: 10px;
  }
  .menu {
    font-family: 'Special Elite', cursive;
    font-size: 18px;
    line-height: 1.5;
    margin-bottom: 20px;
    white-space: pre-line;
  }
  /* Coluna central */
  .center-column {
    width: 480px;
    float: left;
    text-align: center;
    margin: 0 20px;
  }
  .center-column img {
    max-width: 100%;
    margin-bottom: 10px;
  }
  .scroll-box {
    width: 100%;
    height: 120px;
    overflow-y: scroll;
    border: 1px solid #ccc;
    padding: 10px;
    background: white;
    font-family: 'Courier New', monospace;
    font-size: 13px;
    text-align: left;
  }
  /* Coluna direita */
  .right-column {
    width: 180px;
    float: left;
    text-align: center;
  }
  .right-column img {
    max-width: 100%;
    margin-bottom: 10px;
  }
  .calendar {
    font-family: 'Courier New', monospace;
    font-size: 12px;
    background: #d9e6d9;
    border: 1px solid #ccc;
    padding: 5px;
    width: 100%;
  }
  /* Limpar floats */
  .clearfix::after {
    content: "";
    display: table;
    clear: both;
  }
  /* Estilo dos títulos com fontes decorativas */
  h1 {
    font-family: 'Special Elite', cursive;
    font-size: 48px;
    margin-bottom: 10px;
  }
  /* Estilo para balões de fala */
  .speech-bubble {
    position: relative;
    background: #fff;
    border: 1px solid #ccc;
    border-radius: 10px;
    padding: 10px;
    width: 140px;
    font-size: 12px;
    font-family: 'Courier New', monospace;
    margin: 10px auto;
  }
  .speech-bubble::after {
    content: '';
    position: absolute;
    bottom: 100%;
    left: 20px;
    border-width: 10px;
    border-style: solid;
    border-color: transparent transparent #fff transparent;
  }
</style>
</head>
<body>
  <div class="container clearfix">
    <div class="left-column">
      <div class="menu">
        archive<br>

      <!-- Adicione mais imagens e elementos conforme necessário -->
    </div>

    <div class="center-column">
      <h1>Mery*</h1>
      <img src="imagem-central.jpg" alt="Imagem central" style="width: 300px; height: auto; object-fit: contain;" />
      <div class="scroll-box">
        hello welcome to <b>fuchi</b><br>
        this website is a collection of everything i love.<br>
        fuchi is my hobby passion project i started when i was fifteen...
        <!-- Texto rolável -->
      </div>
      <img src="imagem-personagens.png" alt="Personagens" />
    </div>

    <div class="right-column">
      <img src="imagem-blog.jpg" alt="Blog" />
      <div class="speech-bubble">Blog is my life . .</div>
      <img src="imagem-about.jpg" alt="About" />
      <img src="imagem-avatar.jpg" alt="Avatar" />
      <div class="calendar">
        <!-- Calendário simples em tabela -->
        <table>
          <thead>
            <tr><th>Su</th><th>M</th><th>T</th><th>W</th><th>Th</th><th>F</th><th>Sa</th></tr>
          </thead>
          <tbody>
            <tr><td></td><td></td><td></td><td>1</td><td>2</td><td>3</td><td>4</td></tr>
            <tr><td>5</td><td>6</td><td>7</td><td>8</td><td>9</td><td>10</td><td>11</td></tr>
            <!-- Continue o calendário -->
          </tbody>
        </table>
      </div>
    </div>
  </div>
</body>
</html>
