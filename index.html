  <link href="https://fonts.googleapis.com/css2?family=Special+Elite&display=swap" rel="stylesheet" />
  <style>
    body {
      background-color: #f9f9f9;
      font-family: 'Special Elite', monospace, cursive;
      font-size: 14px;
      color: #333;
      margin: 0;
      padding: 10px;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
    }

    /* Colunas */
    .left-column, .center-column, .right-column {
      flex: 1 1 100%;
      text-align: center;
    }

    @media (min-width: 768px) {
      .left-column { flex: 1 1 200px; }
      .center-column { flex: 2 1 480px; }
      .right-column { flex: 1 1 180px; }
    }

    /* Menu */
    .menu {
      font-family: 'Special Elite', cursive;
      font-size: 18px;
      line-height: 1.5;
      margin-bottom: 20px;
      white-space: pre-line;
    }

    /* Imagens */
    img {
      max-width: 100%;
      height: auto;
      margin-bottom: 10px;
    }

    /* Scroll box */
    .scroll-box {
      width: 100%;
      max-height: 200px;
      overflow-y: auto;
      border: 1px solid #ccc;
      padding: 10px;
      background: white;
      font-family: 'Courier New', monospace;
      font-size: 13px;
      text-align: left;
    }

    /* Títulos */
    h1 {
      font-family: 'Special Elite', cursive;
      font-size: 36px;
      margin-bottom: 10px;
    }

    /* Balão de fala */
    .speech-bubble {
      position: relative;
      background: #fff;
      border: 1px solid #ccc;
      border-radius: 10px;
      padding: 10px;
      width: 80%;
      max-width: 140px;
      font-size: 12px;
      font-family: 'Courier New', monospace;
      margin: 10px auto;
    }
    .speech-bubble::after {
      content: '';
      position: absolute;
      bottom: 100%;
      left: 20px;
      border-width: 10px;
      border-style: solid;
      border-color: transparent transparent #fff transparent;
    }

    /* Calendário */
    .calendar {
      font-family: 'Courier New', monospace;
      font-size: 12px;
      background: #d9e6d9;
      border: 1px solid #ccc;
      padding: 5px;
      width: 100%;
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      text-align: center;
    }
    th, td {
      padding: 4px;
    }
  </style>
</head>
