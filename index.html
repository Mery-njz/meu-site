    <style>
        /* CARROSSEL */
.carousel {
  position: absolute;
  top: 55%;
  left: 0;
  width: 100%;
  transform: translateY(-50%);
  overflow: hidden;

  touch-action: pan-y; /* permite rolar o site */
}

.carousel-track {
  display: flex;
  width: max-content;
  animation: scroll 25s linear infinite;

  touch-action: pan-y; /* evita travar o scroll */
}

/* PAUSA */
.carousel:hover .carousel-track {
  animation-play-state: paused;
}

.carousel:active .carousel-track {
  animation-play-state: paused;
}

/* IMAGENS */
.carousel img {
  width: 250px;
  height: 250px;
  margin-right: 10px;
  border-radius: 10px;
  cursor: pointer;
  transition: 0.3s;
}

.carousel img:hover {
  transform: scale(1.05);
}

/* ANIMAÇÃO */
@keyframes scroll {
  0% { transform: translateX(0); }
  100% { transform: translateX(-50%); }
}
