<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title> - </title>
  <link rel="icon" type="image/png" href="icon.jpg">

  <style>
    body {
            background-image: url('black.jpg');
            background-repeat: no-repeat;
            background-position: center;
            background-size: cover;
            background-attachment: fixed;
        }

    h1 {
      text-align: center;
      color: pink;
      margin-bottom: 30px;
    }

    .sobre {
      display: flex;
      gap: 40px;
    }

    .coluna {
      flex: 1;
    }

    .coluna img {
  max-width: 150px;   /* tamanho máximo da foto */
  height: auto;       /* mantém proporção */
  display: block;     /* permite centralizar */
  margin: 0 auto 20px auto; /* centraliza e dá espaço abaixo */
  border-radius: 12px;
  box-shadow: 0 0 15px rgba(255, 128, 192, 0.7); /* sombra rosa */
}


    .coluna p {
      margin: 15px 0;
      line-height: 1.6;
      color: #333; 
      font-size: 18px;
    }

    .btn {
      display: inline-block;
      padding: 10px 20px;
      background-color: #ffc0eb;
      color: #000;
      text-decoration: none;
      border-radius: 20px;
      font-weight: bold;
      transition: all 0.3s ease;
      margin-top: 30px;
    }

    .btn:hover {
      background-color: #ff9fd6;
      transform: scale(1.05);
    }

    
    @media screen and (max-width:700px) {
      .sobre {
        flex-direction: column;
      }
    }
    .colagem img:nth-child(1) { top: 20px; left: 30px; transform: rotate(-5deg); }
    .colagem img:nth-child(2) { top: 120px; left: 200px; transform: rotate(3deg); }
    .colagem img:nth-child(3) { top: 250px; left: 80px; transform: rotate(-8deg); }
    
  </style>
</head>
<body>
  <div class="quadro">
    <h1>Sobre mim</h1>
      
      <div class="colagem">
        <img src="icons dark/city.jpg" alt="city dark">
        <img src="icons dark/photo dark.jpg" alt="phto dark">
        <img src="icons dark/piano dark.jpg" alt="piano girl dark">
       
    </div>
    <a href="pag4.html" class="btn">Voltar para sobre mery</a>
  </div>
</body>
</html>
