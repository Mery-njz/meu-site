<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <title>Mery's Collection - Dinâmico</title>
  <link rel="stylesheet" href="livros.css" />
  <style>
    /* Adicione aqui o CSS do container e do menu para manter o estilo */
    .frame {
      width: 620px;
      height: 510px;
      background: #f8f8f6;
      border: 1px solid #c7cec2;
      overflow-y: auto;
      padding: 15px;
      margin: 20px auto;
    }
    nav a {
      margin: 0 10px;
      cursor: pointer;
      text-decoration: underline;
      color: #8f9b83;
    }
  </style>
</head>
<body>

  <header>
    <h1>Mery's Collection</h1>
    <nav>
      <a href="#" onclick="loadContent('home')">home</a>
      <a href="#" onclick="loadContent('books')">books</a>
      <a href="#" onclick="loadContent('beauty')">beauty</a>
    </nav>
  </header>

  <div class="frame" id="content-frame">
    <h2>Bem-vinda!</h2>
    <p>Selecione uma categoria acima para ver o conteúdo.</p>
  </div>

  <script>
    function loadContent(section) {
      const container = document.getElementById('content-frame');
      const contents = {
        home: `<h2>Home</h2><p>Conteúdo da página inicial.</p>`,
        books: `<h2>Books</h2>
                <ul>
                  <li>Amor e Gelato</li>
                  <li>Cidade de Papel</li>
                  <li>Fallen</li>
                </ul>`,
        beauty: `<h2>Beauty</h2><p>Dicas e favoritos de beleza.</p>`
      };
      container.innerHTML = contents[section] || '<p>Conteúdo não encontrado.</p>';
    }
  </script>

</body>
</html>






























<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Menu - Mery</title>
  <link rel="icon" type="image/png" href="icon.jpg">

  <style>
    body {
      background-color: #111;
      font-family: 'Lobster', cursive;
      color: #f5f5f5;
      margin: 0;
      display: flex;
      flex-direction: column; 
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .menu {
      display: flex;
      gap: 30px; 
      margin-bottom: 30px;
    }

.livro img {
  width: 200px; /* tamanho do livro */
  display: block;
  margin: 0 auto 30px auto; /* centraliza e dá espaço abaixo */
  filter: drop-shadow(0 0 15px rgba(255, 128, 192, 0.7)); /* sombra rosa */
}

    
    .card {
      background-color: #fff;
      color: #333;
      text-align: center;
      padding: 20px;
      width: 220px;
      border-radius: 3px;
      box-shadow: 0 4px 12px rgba(255, 192, 235, 0.4);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .card:hover {
      transform: scale(1.05);
      box-shadow: 0 0 15px rgba(255, 128, 192, 0.6);
    }

    .card h2 {
      color: pink;
      margin-bottom: 10px;
    }

    .card a {
      display: inline-block;
      padding: 10px 15px;
      background-color: #ffc0eb;
      color: #000;
      text-decoration: none;
      border-radius: 20px;
      font-weight: bold;
      transition: all 0.3s ease;
    }

    .card a:hover {
      background-color: #ff9fd6;
      transform: scale(1.05);
    }

    .btn {
      display: inline-block;
      padding: 10px 20px;
      background-color: #ffc0eb;
      color: #000;
      text-decoration: none;
      border-radius: 20px;
      font-weight: bold;
      transition: all 0.3s ease;
    }

    .btn:hover {
      background-color: #ff9fd6;
      transform: scale(1.05);
    }
  </style>
</head>
<body>

 <div class="livro">
    <img src="livro.png" alt="Livro aberto">
  </div>
  
  <div class="menu">
    <div class="card">
      <h2>Livros</h2>
      <a href="pag3.html">Entrar</a>
    </div>

    <div class="card">
      <h2>Mangás</h2>
      <a href="mangas.html">Entrar</a>
    </div>

    <div class="card">
      <h2>Manhwa</h2>
      <a href="manwha.html">Entrar</a>
    </div>
  </div>

  <a href="index.html" class="btn">Voltar para Home</a>
</body>
</html>
